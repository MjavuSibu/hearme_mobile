name: hearme_mobile
description: HearMe — Assistive sound recognition alerts for the deaf and hard-of-hearing.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  web_socket_channel: ^2.4.5
  vibration: ^1.9.0
  flutter_local_notifications: ^17.2.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/